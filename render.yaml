services:
  - type: web
    name: edutrack-main-phamanhtuan074-api
    runtime: docker
    plan: free
    region: singapore
    repo: https://github.com/PhamAnhTuan074/EduTrack-main.git
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    initialDeployHook: npm run prisma:seed-extra
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: edutrack-main-phamanhtuan074-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://edutrack-main.vercel.app

databases:
  - name: edutrack-main-phamanhtuan074-db
    plan: free
    region: singapore
    databaseName: edutrack
    user: edutrack
    postgresMajorVersion: "16"
